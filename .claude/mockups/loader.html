<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    color: #F5F5F0;
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Loader overlay ── */
  #loader {
    position: fixed;
    inset: 0;
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 100;
  }

  /* Split exit — two curtains */
  #loader-top, #loader-bottom {
    position: fixed;
    left: 0; right: 0;
    background: #0A0A0A;
    z-index: 100;
    transition: transform 0.75s cubic-bezier(0.76, 0, 0.24, 1);
  }
  #loader-top    { top: 0;   height: 50%; transform: translateY(0); }
  #loader-bottom { bottom: 0; height: 50%; transform: translateY(0); }

  #loader-top.exit    { transform: translateY(-100%); }
  #loader-bottom.exit { transform: translateY(100%); }

  /* ── Content ── */
  #loader-content {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 101;
    gap: 20px;
    pointer-events: none;
  }

  /* Diamond logo */
  .logo-mark {
    opacity: 0;
    transform: scale(0.6);
    animation: logo-in 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }
  @keyframes logo-in {
    to { opacity: 1; transform: scale(1); }
  }
  .logo-pulse {
    animation: logo-in 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards,
               logo-pulse 0.6s ease-in-out 1.2s;
  }
  @keyframes logo-pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  /* Name — each letter clips up */
  .name-row {
    display: flex;
    gap: 0.02em;
    overflow: hidden;
    line-height: 1;
  }
  .name-letter {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(5rem, 16vw, 11rem);
    letter-spacing: -0.04em;
    color: #F5F5F0;
    display: inline-block;
    transform: translateY(110%);
    opacity: 0;
    animation: letter-up 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  /* Stagger delays */
  .l1 { animation-delay: 0.3s; }
  .l2 { animation-delay: 0.38s; }
  .l3 { animation-delay: 0.46s; }
  .l4 { animation-delay: 0.54s; }
  .l5 { animation-delay: 0.62s; }

  @keyframes letter-up {
    to { transform: translateY(0); opacity: 1; }
  }

  /* Gold divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fade-in 0.5s ease 1.0s forwards;
  }
  .divider-line {
    width: 0;
    height: 1px;
    background: #C9A84C;
    animation: line-grow 0.6s ease 1.05s forwards;
  }
  .divider-diamond {
    width: 6px; height: 6px;
    background: #C9A84C;
    transform: rotate(45deg);
    opacity: 0;
    animation: fade-in 0.4s ease 1.1s forwards;
  }
  @keyframes line-grow {
    to { width: 60px; }
  }

  /* Role line */
  .role {
    font-size: 0.75rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #888880;
    opacity: 0;
    transform: translateY(8px);
    animation: fade-up 0.6s ease 1.15s forwards;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }
  @keyframes fade-up {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Site content behind loader ── */
  #site {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0A0A0A;
    background-image:
      radial-gradient(ellipse 60% 55% at -5% -8%, rgba(124,58,237,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 55% 50% at 108% 108%, rgba(201,168,76,0.18) 0%, transparent 70%);
    z-index: 1;
  }
  #site p {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #F5F5F0;
    opacity: 0.15;
    text-align: center;
    padding: 2rem;
  }

  /* Replay button */
  #replay {
    position: fixed;
    bottom: 2rem; right: 2rem;
    z-index: 200;
    background: rgba(124,58,237,0.2);
    border: 1px solid rgba(124,58,237,0.4);
    color: #A78BFA;
    padding: 0.5rem 1.25rem;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s;
  }
  #replay:hover { background: rgba(124,58,237,0.35); }
</style>
</head>
<body>

<!-- Site content visible after loader exits -->
<div id="site">
  <p>I own the full product lifecycle —<br><span style="background: linear-gradient(135deg,#A78BFA,#C9A84C); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">from first insight to shipped experience.</span></p>
</div>

<!-- Loader curtains (split exit) -->
<div id="loader-top"></div>
<div id="loader-bottom"></div>

<!-- Loader content -->
<div id="loader-content">
  <!-- Diamond logo -->
  <div class="logo-mark logo-pulse">
    <svg width="28" height="28" viewBox="0 0 18 18" fill="none">
      <rect x="9" y="1" width="11.3" height="11.3" rx="2" transform="rotate(45 9 1)" fill="#C9A84C"/>
    </svg>
  </div>

  <!-- JAMIE letters -->
  <div class="name-row" aria-label="Jamie">
    <span class="name-letter l1">J</span>
    <span class="name-letter l2">A</span>
    <span class="name-letter l3">M</span>
    <span class="name-letter l4">I</span>
    <span class="name-letter l5">E</span>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Role -->
  <p class="role">UX/UI Designer · ALDO Group</p>
</div>

<button id="replay">↺ Replay</button>

<script>
  let exitTimeout;

  function runLoader() {
    const top = document.getElementById('loader-top');
    const bot = document.getElementById('loader-bottom');
    const content = document.getElementById('loader-content');

    // Reset
    top.classList.remove('exit');
    bot.classList.remove('exit');
    content.style.opacity = '1';

    // Re-trigger letter animations by cloning content
    const letters = content.querySelectorAll('.name-letter, .logo-mark, .divider, .role, .divider-line, .divider-diamond');
    letters.forEach(el => {
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = '';
    });

    // Exit after 2.2s
    clearTimeout(exitTimeout);
    exitTimeout = setTimeout(() => {
      content.style.transition = 'opacity 0.3s ease';
      content.style.opacity = '0';
      setTimeout(() => {
        top.classList.add('exit');
        bot.classList.add('exit');
      }, 200);
    }, 2200);
  }

  document.getElementById('replay').addEventListener('click', runLoader);

  // Auto-run on load
  runLoader();
</script>
</body>
</html>

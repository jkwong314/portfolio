<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader C — Statement Flash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #F5F5F0;
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  #site {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0A0A0A;
    background-image:
      radial-gradient(ellipse 60% 55% at -5% -8%, rgba(124,58,237,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 55% 50% at 108% 108%, rgba(201,168,76,0.18) 0%, transparent 70%);
    z-index: 1;
  }
  #site p {
    font-family: 'Archivo', sans-serif; font-weight: 900;
    font-size: clamp(2rem,5vw,4rem); letter-spacing: -0.04em;
    color: #F5F5F0; opacity: 0.15; text-align: center; padding: 2rem;
  }

  /* Curtains */
  #loader-top, #loader-bottom {
    position: fixed; left: 0; right: 0;
    background: #0A0A0A; z-index: 100;
    transition: transform 0.75s cubic-bezier(0.76, 0, 0.24, 1);
  }
  #loader-top    { top: 0;    height: 50%; transform: translateY(0); }
  #loader-bottom { bottom: 0; height: 50%; transform: translateY(0); }
  #loader-top.exit    { transform: translateY(-100%); }
  #loader-bottom.exit { transform: translateY(100%); }

  #loader-content {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: clamp(2rem, 8vw, 8rem);
    z-index: 101; pointer-events: none;
  }

  /* Statement words */
  .statement {
    display: flex;
    flex-wrap: wrap;
    gap: 0.2em 0.25em;
    max-width: 900px;
    line-height: 1;
    margin-bottom: clamp(1rem, 3vw, 2rem);
  }

  .word {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(2.8rem, 7vw, 6.5rem);
    letter-spacing: -0.04em;
    color: #F5F5F0;
    display: inline-block;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1),
                transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .word.accent {
    background: linear-gradient(135deg, #A78BFA 0%, #C9A84C 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .word.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Byline */
  .byline {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #444440;
    opacity: 0;
    transition: opacity 0.5s ease;
    margin-top: 0.5rem;
  }
  .byline.visible { opacity: 1; }

  /* Gold bar accent */
  .accent-bar {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #7C3AED, #C9A84C);
    margin-bottom: clamp(1.5rem, 4vw, 3rem);
    transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
    border-radius: 2px;
  }
  .accent-bar.visible { width: clamp(40px, 8vw, 80px); }

  #replay {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
    background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
    color: #A78BFA; padding: 0.5rem 1.25rem; border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem;
    letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s;
  }
  #replay:hover { background: rgba(124,58,237,0.35); }

  .option-tag {
    position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
    z-index: 200; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: #444440;
  }
</style>
</head>
<body>

<div id="site">
  <p>I own the full product lifecycle —<br>
  <span style="background:linear-gradient(135deg,#A78BFA,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">from first insight to shipped experience.</span></p>
</div>

<div id="loader-top"></div>
<div id="loader-bottom"></div>

<div id="loader-content">
  <div class="accent-bar" id="bar"></div>
  <div class="statement" id="statement"></div>
  <p class="byline" id="byline">Jamie Kwong · Product Designer</p>
</div>

<p class="option-tag">Option C — Statement Flash</p>
<button id="replay">↺ Replay</button>

<script>
  // Line 1 = plain, Line 2 = accent gradient
  const LINES = [
    { text: "I own the full", accent: false },
    { text: "product lifecycle —", accent: false },
    { text: "from first insight", accent: true },
    { text: "to shipped experience.", accent: true },
  ];

  let timers = [];

  function clearTimers() {
    timers.forEach(t => clearTimeout(t));
    timers = [];
  }

  function later(fn, ms) {
    const t = setTimeout(fn, ms);
    timers.push(t);
    return t;
  }

  function runLoader() {
    clearTimers();

    const top = document.getElementById('loader-top');
    const bot = document.getElementById('loader-bottom');
    const content = document.getElementById('loader-content');
    const statementEl = document.getElementById('statement');
    const barEl = document.getElementById('bar');
    const bylineEl = document.getElementById('byline');

    // Reset
    top.classList.remove('exit');
    bot.classList.remove('exit');
    content.style.opacity = '1';
    content.style.transition = '';
    barEl.classList.remove('visible');
    bylineEl.classList.remove('visible');
    statementEl.innerHTML = '';

    // Build word spans — group by line, words within each line
    LINES.forEach(line => {
      const words = line.text.split(' ');
      words.forEach(word => {
        const span = document.createElement('span');
        span.className = 'word' + (line.accent ? ' accent' : '');
        span.textContent = word;
        statementEl.appendChild(span);
      });
    });

    const words = statementEl.querySelectorAll('.word');

    // Bar slides in first
    later(() => { barEl.classList.add('visible'); }, 100);

    // Words stagger in
    const WORD_DELAY = 90; // ms between each word
    const START_OFFSET = 400;
    words.forEach((w, i) => {
      later(() => { w.classList.add('visible'); }, START_OFFSET + i * WORD_DELAY);
    });

    // Byline after all words
    const bylineStart = START_OFFSET + words.length * WORD_DELAY + 100;
    later(() => { bylineEl.classList.add('visible'); }, bylineStart);

    // Fade out content, then split curtains open
    const exitStart = bylineStart + 1000;
    later(() => {
      content.style.transition = 'opacity 0.4s ease';
      content.style.opacity = '0';
      later(() => {
        top.classList.add('exit');
        bot.classList.add('exit');
      }, 350);
    }, exitStart);
  }

  document.getElementById('replay').addEventListener('click', runLoader);
  runLoader();
</script>
</body>
</html>

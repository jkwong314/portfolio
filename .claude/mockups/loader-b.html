<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader B — Counter + Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #F5F5F0;
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  #site {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0A0A0A;
    background-image:
      radial-gradient(ellipse 60% 55% at -5% -8%, rgba(124,58,237,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 55% 50% at 108% 108%, rgba(201,168,76,0.18) 0%, transparent 70%);
    z-index: 1;
  }
  #site p {
    font-family: 'Archivo', sans-serif; font-weight: 900;
    font-size: clamp(2rem,5vw,4rem); letter-spacing: -0.04em;
    color: #F5F5F0; opacity: 0.15; text-align: center; padding: 2rem;
  }

  /* Curtains */
  #loader-top, #loader-bottom {
    position: fixed; left: 0; right: 0;
    background: #0A0A0A; z-index: 100;
    transition: transform 0.75s cubic-bezier(0.76, 0, 0.24, 1);
  }
  #loader-top    { top: 0;    height: 50%; transform: translateY(0); }
  #loader-bottom { bottom: 0; height: 50%; transform: translateY(0); }
  #loader-top.exit    { transform: translateY(-100%); }
  #loader-bottom.exit { transform: translateY(100%); }

  #loader-content {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 101; pointer-events: none;
  }

  /* Counter */
  .counter-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    width: 220px; height: 220px;
  }

  .counter {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(5rem, 14vw, 9rem);
    letter-spacing: -0.06em;
    background: linear-gradient(135deg, #C9A84C 0%, #E5C97E 50%, #C9A84C 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: opacity 0.3s ease, transform 0.3s ease;
    user-select: none;
  }

  /* Logo that replaces counter */
  .logo-final {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1),
                transform 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .logo-final.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* Progress bar */
  .progress-track {
    width: 160px; height: 1px;
    background: rgba(201,168,76,0.2);
    margin-top: 32px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #C9A84C, #E5C97E);
    width: 0%;
    transition: width 0.1s linear;
    border-radius: 2px;
  }

  /* Label */
  .counter-label {
    margin-top: 16px;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #444440;
    opacity: 0;
    animation: fade-in 0.4s ease 0.3s forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  #replay {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
    background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
    color: #A78BFA; padding: 0.5rem 1.25rem; border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem;
    letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s;
  }
  #replay:hover { background: rgba(124,58,237,0.35); }

  .option-tag {
    position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
    z-index: 200; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: #444440;
  }
</style>
</head>
<body>

<div id="site">
  <p>I own the full product lifecycle —<br>
  <span style="background:linear-gradient(135deg,#A78BFA,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">from first insight to shipped experience.</span></p>
</div>

<div id="loader-top"></div>
<div id="loader-bottom"></div>

<div id="loader-content">
  <div class="counter-wrap">
    <span class="counter" id="counter">0</span>
    <div class="logo-final" id="logo-final">
      <svg width="80" height="80" viewBox="0 0 18 18" fill="none">
        <rect x="9" y="1" width="11.3" height="11.3" rx="2" transform="rotate(45 9 1)" fill="#C9A84C"/>
      </svg>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
  <p class="counter-label">Loading</p>
</div>

<p class="option-tag">Option B — Counter + Logo</p>
<button id="replay">↺ Replay</button>

<script>
  let raf, exitTimeout;

  function runLoader() {
    const counterEl = document.getElementById('counter');
    const progressEl = document.getElementById('progress');
    const logoEl = document.getElementById('logo-final');
    const top = document.getElementById('loader-top');
    const bot = document.getElementById('loader-bottom');
    const content = document.getElementById('loader-content');

    // Reset
    cancelAnimationFrame(raf);
    clearTimeout(exitTimeout);
    top.classList.remove('exit');
    bot.classList.remove('exit');
    content.style.opacity = '1';
    content.style.transition = '';
    counterEl.style.opacity = '1';
    counterEl.style.transform = 'scale(1)';
    logoEl.classList.remove('visible');
    progressEl.style.width = '0%';
    progressEl.style.transition = 'none';

    let start = null;
    const DURATION = 1800; // ms to count 0→100

    function tick(ts) {
      if (!start) start = ts;
      const elapsed = ts - start;
      const progress = Math.min(elapsed / DURATION, 1);
      // Ease-in-out
      const eased = progress < 0.5
        ? 2 * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;
      const val = Math.floor(eased * 100);

      counterEl.textContent = val;
      progressEl.style.transition = 'none';
      progressEl.style.width = val + '%';

      if (progress < 1) {
        raf = requestAnimationFrame(tick);
      } else {
        // Counter → logo swap
        counterEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        counterEl.style.opacity = '0';
        counterEl.style.transform = 'scale(1.3)';
        progressEl.style.transition = 'opacity 0.3s ease';
        progressEl.style.opacity = '0';

        setTimeout(() => {
          logoEl.classList.add('visible');
        }, 200);

        // Exit after logo shows
        exitTimeout = setTimeout(() => {
          content.style.transition = 'opacity 0.3s ease';
          content.style.opacity = '0';
          setTimeout(() => {
            top.classList.add('exit');
            bot.classList.add('exit');
          }, 200);
        }, 2600);
      }
    }

    raf = requestAnimationFrame(tick);
  }

  document.getElementById('replay').addEventListener('click', runLoader);
  runLoader();
</script>
</body>
</html>
